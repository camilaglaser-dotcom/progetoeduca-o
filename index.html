
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regra de 3 · Matemática Descomplicada</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #e6f0fa 0%, #d4e4f2 100%);
            font-family: 'Inter', 'Segoe UI', Roboto, system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(6px);
            border-radius: 60px 60px 40px 40px;
            box-shadow: 0 30px 40px -15px #1d3f5e, 0 10px 0 #d4e1ed inset;
            border: 2px solid #ffffffaa;
            overflow: hidden;
        }

        /* cabeçalho temático regra de três */
        .header-proporcao {
            background: #134074;
            background-image: radial-gradient(circle at 0% 30%, #1e5a8a, #0b2d4e);
            padding: 32px 36px 24px;
            color: white;
            border-bottom: 8px solid #f4c542;
            position: relative;
        }

        .header-proporcao::after {
            content: "a/b = c/d  •  3 : 6 = 5 : x";
            position: absolute;
            bottom: 12px;
            right: 40px;
            font-size: 1.8rem;
            font-weight: 300;
            opacity: 0.2;
            color: #c2e2ff;
            letter-spacing: 3px;
            white-space: nowrap;
        }

        .logo-abc {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .logo-simbolo {
            background: #f4c542;
            width: 70px;
            height: 70px;
            border-radius: 30px 10px 30px 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            font-weight: 800;
            color: #0c2f44;
            transform: rotate(-2deg);
            box-shadow: 0 8px 0 #b07f26;
        }

        .titulo-header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-shadow: 4px 4px 0 #0a2638;
        }

        .titulo-header p {
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .pill {
            background: #f4c542;
            color: #112f42;
            border-radius: 40px;
            padding: 8px 18px;
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 4px 0 #946d24;
        }

        /* navegação simples */
        .nav-rapida {
            background: #0a2c3f;
            padding: 14px 32px;
            display: flex;
            gap: 32px;
            flex-wrap: wrap;
            border-bottom: 2px solid #f4c54280;
        }

        .nav-rapida a {
            color: #f0e7cf;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: 500;
            padding: 5px 0;
            border-bottom: 3px solid transparent;
        }

        .nav-rapida a:hover {
            border-bottom-color: #f4c542;
            color: #ffd885;
        }

        /* main */
        .conteudo {
            padding: 44px 38px;
        }

        /* seção destaque: regra de 3 explicada */
        .destaque-regra {
            background: #fcf8f0;
            border-radius: 48px 48px 48px 16px;
            padding: 36px 38px;
            margin-bottom: 44px;
            border: 1px solid #f4e0c0;
            box-shadow: 0 18px 0 #c0b39e;
        }

        .grid-explicacao {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            align-items: center;
        }

        .texto-explicacao {
            flex: 2 1 300px;
        }

        .texto-explicacao h2 {
            font-size: 2.6rem;
            color: #0b3f55;
            font-weight: 800;
            line-height: 1.2;
        }

        .texto-explicacao h2 span {
            background: #f4c542;
            padding: 0 12px;
            display: inline-block;
            transform: rotate(-1deg);
        }

        .texto-explicacao p {
            font-size: 1.3rem;
            color: #16455b;
            margin: 22px 0 20px;
            max-width: 600px;
        }

        .mini-tabela {
            background: #134074;
            border-radius: 28px;
            padding: 22px 30px;
            color: white;
            display: inline-flex;
            flex-wrap: wrap;
            gap: 32px;
            align-items: center;
            box-shadow: 0 10px 0 #0b2840;
        }

        .mini-tabela .item {
            font-size: 2rem;
            font-weight: 600;
            background: #1a5785;
            padding: 12px 24px;
            border-radius: 50px;
        }

        .item span {
            color: #f4c542;
            margin: 0 8px;
        }

        .exemplo-icone {
            flex: 0 0 auto;
            font-size: 5.8rem;
            background: white;
            border-radius: 60% 40% 60% 40%;
            padding: 20px 15px;
            box-shadow: 0 12px 0 #acbdcc;
            line-height: 1;
        }

        /* calculadora interativa de regra de três */
        .calculadora-r3 {
            background: linear-gradient(125deg, #1b4e6e, #0f3b55);
            border-radius: 50px 50px 30px 30px;
            padding: 40px 35px;
            margin: 50px 0 40px;
            box-shadow: 0 22px 0 #072433;
            color: white;
        }

        .calc-titulo {
            font-size: 2.2rem;
            font-weight: 600;
            display: flex;
            gap: 18px;
            align-items: center;
            margin-bottom: 30px;
        }

        .calc-titulo span {
            font-size: 2.8rem;
        }

        .formula-r3 {
            background: #0b3143;
            border-radius: 90px;
            padding: 25px 25px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-around;
            gap: 20px;
            border: 2px solid #f4c542;
        }

        .entrada-grupo {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            background: #dbe9f3;
            padding: 12px 20px;
            border-radius: 60px;
            color: #022433;
            font-weight: 600;
            font-size: 1.3rem;
        }

        .entrada-grupo label {
            background: #f4c542;
            padding: 8px 15px;
            border-radius: 40px;
            font-size: 1.2rem;
        }

        .entrada-grupo input {
            background: white;
            border: none;
            border-radius: 40px;
            padding: 15px 18px;
            width: 110px;
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
            border-bottom: 5px solid #869eaf;
        }

        .operador-r3 {
            font-size: 2.8rem;
            font-weight: 800;
            color: #f4c542;
            text-shadow: 3px 3px 0 #8d621e;
        }

        .btn-calcular {
            background: #f4c542;
            border: none;
            border-radius: 60px;
            padding: 20px 40px;
            font-size: 1.8rem;
            font-weight: 800;
            color: #022433;
            border-bottom: 7px solid #a0741f;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 6px 0 #614c1a;
        }

        .btn-calcular:active {
            transform: translateY(6px);
            border-bottom-width: 2px;
        }

        .resultado-r3 {
            background: #fcf3dd;
            border-radius: 70px;
            padding: 30px 40px;
            margin-top: 35px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 25px;
            border-bottom: 10px solid #b89f70;
        }

        .resultado-mensagem {
            font-size: 2rem;
            font-weight: 700;
            color: #003952;
        }

        .resultado-valor {
            background: #134074;
            color: white;
            border-radius: 80px;
            padding: 20px 45px;
            font-size: 3rem;
            font-weight: 800;
            border-bottom: 8px solid #0b2940;
        }

        /* cards de exemplos práticos */
        .secao-exemplos h3 {
            font-size: 2rem;
            color: #134074;
            margin: 45px 0 20px;
            border-left: 18px solid #f4c542;
            padding-left: 20px;
        }
